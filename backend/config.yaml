embedding:
  model: BAAI/bge-small-en-v1.5
  dimension: 384
  device: cpu                    # change to 'cuda' if GPU available
  normalize: true                # required for cosine similarity

chunking:
  strategy: recursive            # recursive | sentence | fixed
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", " ", ""]

retrieval:
  top_k: 5
  similarity_threshold: 0.35    # chunks below this score are excluded

llm:
  provider: nvidia
  base_url: https://integrate.api.nvidia.com/v1
  model: meta/llama-3.1-70b-instruct
  max_tokens: 1024
  temperature: 0.2
  stream: true

chroma:
  path: ./chroma_db
  collection: localmind
  distance: cosine

ingest:
  allowed_extensions: [".pdf", ".md", ".txt"]
  max_file_size_mb: 50

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://localhost:3000
